services:
  starter_app:
    build: .
    environment:
      DB_PATH: /data/app.db
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:alpine
    ports:
    - "8080:80"
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf:z
    depends_on:
      starter_app:
        condition: service_healthy

volumes:
  app_data:
